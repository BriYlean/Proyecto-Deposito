<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Movimientos - Logística</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { obsidian: { DEFAULT: '#070709', card: '#111217', border: '#1f212a', navbar: '#0d0e12', hover: '#1b1c23' } } } }
        }
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-gray-100 dark:bg-obsidian antialiased text-sm transition-colors duration-300">

    <div id="sidebar-overlay" class="sidebar-overlay" onclick="cerrarSidebar()"></div>

    <nav class="bg-slate-800 dark:bg-obsidian-navbar text-white border-b dark:border-obsidian-border shadow-lg fixed top-0 left-0 right-0 z-50 navbar">
        <div class="navbar-inner h-full flex justify-between items-center px-4">
            <div class="flex items-center gap-3">
                <button onclick="abrirSidebar()" class="md:hidden bg-slate-700 p-2 rounded-lg text-lg"><i class="fas fa-bars"></i></button>
                <h1 class="text-base sm:text-xl font-bold"><i class="fas fa-clipboard-list"></i> <span class="hidden sm:inline">HISTORIAL |</span> Movimientos</h1>
            </div>
            <button onclick="alternarTema()" id="btn-tema" class="bg-slate-700 p-2 rounded-lg transition-all active:scale-95"><i class="fas fa-moon"></i></button>
        </div>
    </nav>

    <aside id="sidebar" class="sidebar">
        <div class="sidebar-profile">
            <div class="sidebar-avatar" id="sb-avatar">?</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="sb-nombre">Cargando...</div>
                <div class="sidebar-user-role" id="sb-rol">—</div>
            </div>
        </div>
        <div class="sidebar-divider"></div>
        <nav class="sidebar-nav">
            <div class="sidebar-nav-label">NAVEGACIÓN</div>
            <a href="/" class="sidebar-link" data-page="/"><span class="sidebar-link-icon"><i class="fas fa-chart-bar"></i></span><span>Dashboard</span></a>
            <a href="/listado" class="sidebar-link" data-page="/listado"><span class="sidebar-link-icon"><i class="fas fa-clipboard-list"></i></span><span>Listado de Stock</span></a>
            <a href="/registro" class="sidebar-link" data-page="/registro"><span class="sidebar-link-icon"><i class="fas fa-inbox"></i></span><span>Registro de Stock</span></a>
            <a href="/egreso" class="sidebar-link" data-page="/egreso"><span class="sidebar-link-icon"><i class="fas fa-upload"></i></span><span>Egreso de Stock</span></a>
            <a href="/movimientos" class="sidebar-link active" data-page="/movimientos"><span class="sidebar-link-icon"><i class="fas fa-clipboard-list"></i></span><span>Movimientos</span></a>
            <a href="/pedidos" class="sidebar-link" data-page="/pedidos"><span class="sidebar-link-icon"><i class="fas fa-truck"></i></span><span>Órdenes de Pedido</span></a>
            <a href="/productos" class="sidebar-link" data-page="/productos"><span class="sidebar-link-icon"><i class="fas fa-tags"></i></span><span>Catálogo de Productos</span></a>
        </nav>
        <div class="flex-1"></div>
        <div class="sidebar-footer">
            <div class="sidebar-divider"></div>
            <button class="sidebar-logout" onclick="cerrarSesion()">
                <span class="sidebar-link-icon"><i class="fas fa-power-off"></i></span><span>Cerrar Sesión</span>
            </button>
        </div>
    </aside>

    <div class="main-content">
        <main class="container mx-auto p-3 sm:p-6">

            <div class="bg-white dark:bg-obsidian-card rounded-2xl border dark:border-obsidian-border p-4 mb-4 sm:mb-6">
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                    <input type="text" id="filtro-search" placeholder="SKU o producto..."
                        oninput="debounceBuscar()"
                        class="col-span-2 sm:col-span-1 px-3 py-2 rounded-xl border dark:border-obsidian-border bg-gray-50 dark:bg-obsidian-navbar text-gray-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-blue-500 text-sm">

                    <select id="filtro-tipo" onchange="paginaActual=1; cargarMovimientos()"
                        class="px-3 py-2 rounded-xl border dark:border-obsidian-border bg-gray-50 dark:bg-obsidian-navbar text-gray-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        <option value="">Todos los tipos</option>
                        <option value="INGRESO">Ingreso</option>
                        <option value="EGRESO">Egreso</option>
                        <option value="ALTA">Alta</option>
                        <option value="BAJA">Baja</option>
                        <option value="MODIFICACION">Modificación</option>
                    </select>

                    <input type="date" id="filtro-desde" onchange="paginaActual=1; cargarMovimientos()"
                        class="px-3 py-2 rounded-xl border dark:border-obsidian-border bg-gray-50 dark:bg-obsidian-navbar text-gray-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-blue-500 text-sm">

                    <input type="date" id="filtro-hasta" onchange="paginaActual=1; cargarMovimientos()"
                        class="px-3 py-2 rounded-xl border dark:border-obsidian-border bg-gray-50 dark:bg-obsidian-navbar text-gray-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>
            </div>

            <div class="bg-white dark:bg-obsidian-card rounded-2xl border dark:border-obsidian-border overflow-hidden shadow-sm">

                <div class="px-4 py-3 border-b dark:border-obsidian-border bg-gray-50 dark:bg-obsidian-navbar flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-gray-800 dark:text-slate-100 text-sm">Historial de movimientos</h3>
                        <p class="text-xs text-gray-400 dark:text-slate-500 font-mono mt-0.5" id="resumen-total">Cargando...</p>
                    </div>
                    <button onclick="cargarMovimientos()" class="text-xs bg-slate-100 dark:bg-obsidian-hover hover:bg-slate-200 dark:hover:bg-obsidian-border text-gray-600 dark:text-slate-300 px-3 py-1.5 rounded-lg transition-colors border dark:border-obsidian-border">
                        <i class="fas fa-sync-alt"></i> Actualizar
                    </button>
                </div>

                <div class="hidden sm:block overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-700 dark:bg-obsidian-navbar text-white text-xs uppercase tracking-wider">
                            <tr>
                                <th class="p-3">Fecha y hora</th>
                                <th class="p-3">Tipo</th>
                                <th class="p-3">Producto</th>
                                <th class="p-3 text-center">Cantidad</th>
                                <th class="p-3">Usuario</th>
                                <th class="p-3">Detalle</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-movimientos" class="divide-y dark:divide-obsidian-border text-gray-700 dark:text-slate-300">
                            <tr><td colspan="6" class="p-8 text-center text-gray-400 animate-pulse">Cargando movimientos...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="sm:hidden" id="cards-movimientos">
                    <div class="p-6 text-center text-gray-400 animate-pulse">Cargando...</div>
                </div>

                <div class="px-4 py-3 border-t dark:border-obsidian-border flex justify-center items-center gap-1.5 flex-wrap" id="paginacion"></div>
            </div>

        </main>
    </div>

    <script>
        let paginaActual = 1;
        const porPagina = 50;
        let totalPaginas = 1;
        let timerBuscar = null;

        // ---- TEMA ----
        function alternarTema() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('btn-tema').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }

        // ---- SIDEBAR ----
        function abrirSidebar()  { document.getElementById('sidebar').classList.add('open');    document.getElementById('sidebar-overlay').classList.add('active'); }
        function cerrarSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('active'); }

        // ---- USUARIO ----
        function cargarUsuario() {
            const raw = sessionStorage.getItem('usuario');
            if (!raw) { window.location.href = '/login'; return; }
            try {
                const u = JSON.parse(raw);
                const nombreStr = u.nombre || 'Usuario';
                document.getElementById('sb-avatar').textContent = nombreStr.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
                document.getElementById('sb-nombre').textContent = nombreStr;
                document.getElementById('sb-rol').textContent = u.rol || 'Operador';
            } catch (e) {
                window.location.href = '/login';
            }
        }

        function cerrarSesion() {
            if (!confirm('¿Cerrar sesión?')) return;
            sessionStorage.removeItem('usuario');
            fetch('/api/auth/logout', { method:'POST' }).finally(() => window.location.href = '/login');
        }

        // ---- HELPERS ----
        const TIPO_CONFIG = {
            'INGRESO':      { clase: 'badge-ingreso',      label: '<i class="fas fa-arrow-down"></i> Ingreso' },
            'EGRESO':       { clase: 'badge-egreso',       label: '<i class="fas fa-arrow-up"></i> Egreso' },
            'ALTA':         { clase: 'badge-alta',         label: '<i class="fas fa-plus-circle"></i> Alta' },
            'BAJA':         { clase: 'badge-baja',         label: '<i class="fas fa-trash-alt"></i> Baja' },
            'MODIFICACION': { clase: 'badge-modificacion', label: '<i class="fas fa-pen"></i> Modif.' },
        };

        function badgeTipo(tipo) {
            const t = tipo?.toUpperCase();
            const c = TIPO_CONFIG[t] || { clase: 'bg-gray-200 text-gray-700', label: tipo || '—' };
            return `<span class="inline-block px-2 py-0.5 rounded-full text-xs font-bold ${c.clase}">${c.label}</span>`;
        }

        function formatFecha(str) {
            if (!str) return '—';
            const d = new Date(str);
            return d.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric' })
                + ' ' + d.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
        }

        function cantidadDisplay(tipo, cantidad) {
            const t = tipo?.toUpperCase();
            // Soporte ampliado para mostrar ALTA, BAJA y MODIFICACION, no solo ingresos/egresos
            if (t === 'INGRESO' || t === 'ALTA') return `<span class="font-bold text-emerald-500">+${cantidad}</span>`;
            if (t === 'EGRESO'  || t === 'BAJA') return `<span class="font-bold text-rose-500">−${cantidad}</span>`;
            if (t === 'MODIFICACION') return `<span class="font-bold text-purple-500">${cantidad}</span>`;
            return `<span class="text-gray-400">${cantidad || '—'}</span>`;
        }

        // ---- RENDER ----
        function renderTabla(data) {
            if (!data.length) {
                document.getElementById('tabla-movimientos').innerHTML =
                    `<tr><td colspan="6" class="p-8 text-center text-gray-400">No hay movimientos para los filtros aplicados.</td></tr>`;
                return;
            }
            document.getElementById('tabla-movimientos').innerHTML = data.map(m => `
                <tr class="hover:bg-gray-50 dark:hover:bg-obsidian-hover transition-colors">
                    <td class="p-3 font-mono text-xs text-gray-500 dark:text-slate-400 whitespace-nowrap">${formatFecha(m.fecha_movimiento)}</td>
                    <td class="p-3">${badgeTipo(m.tipo_movimiento)}</td>
                    <td class="p-3">
                        <div class="font-medium text-gray-900 dark:text-slate-200 text-xs leading-tight">${m.nombre_producto || '—'}</div>
                        <div class="font-mono text-xs text-blue-500 mt-0.5">${m.sku || '—'}</div>
                    </td>
                    <td class="p-3 text-center">${cantidadDisplay(m.tipo_movimiento, m.cantidad)}</td>
                    <td class="p-3 text-xs text-gray-600 dark:text-slate-400">${m.usuario_nombre || '—'}</td>
                    <td class="p-3 text-xs text-gray-500 dark:text-slate-500 max-w-xs truncate" title="${m.motivo || ''}">${m.motivo || '—'}</td>
                </tr>`).join('');
        }

        function renderCards(data) {
            const contenedor = document.getElementById('cards-movimientos');
            if (!data.length) {
                contenedor.innerHTML = `<div class="p-6 text-center text-gray-400">Sin resultados.</div>`;
                return;
            }
            contenedor.innerHTML = data.map(m => `
                <div class="flex items-start justify-between px-4 py-3 border-b dark:border-obsidian-border last:border-0 gap-3">
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2 flex-wrap mb-1">
                            ${badgeTipo(m.tipo_movimiento)}
                            <span class="font-mono text-xs text-blue-500">${m.sku || '—'}</span>
                        </div>
                        <div class="text-sm font-semibold text-gray-900 dark:text-slate-100 truncate">${m.nombre_producto || '—'}</div>
                        <div class="text-xs text-gray-400 dark:text-slate-500 mt-0.5">${m.usuario_nombre || '—'} · ${formatFecha(m.fecha_movimiento)}</div>
                        ${m.motivo ? `<div class="text-xs text-gray-400 dark:text-slate-500 mt-0.5 truncate">${m.motivo}</div>` : ''}
                    </div>
                    <div class="flex-shrink-0 text-right text-lg font-bold">${cantidadDisplay(m.tipo_movimiento, m.cantidad)}</div>
                </div>`).join('');
        }

        function renderPaginacion() {
            const div = document.getElementById('paginacion');
            div.innerHTML = '';
            if (totalPaginas <= 1) return;

            const btnClass = (activo, disabled) =>
                `min-w-[34px] px-2.5 py-1.5 rounded-lg border text-xs font-medium transition-colors
                ${activo   ? 'bg-blue-600 text-white border-blue-600 font-bold' :
                  disabled ? 'opacity-40 cursor-not-allowed bg-gray-100 dark:bg-obsidian-card dark:border-obsidian-border text-gray-400' :
                             'bg-white dark:bg-obsidian-card dark:border-obsidian-border hover:bg-gray-100 dark:hover:bg-obsidian-hover text-gray-700 dark:text-slate-200'}`;

            const btn = (txt, pag, disabled=false, activo=false) => {
                const b = document.createElement('button');
                b.innerHTML = txt; b.className = btnClass(activo, disabled); b.disabled = disabled;
                if (!disabled && !activo) b.onclick = () => { paginaActual = pag; cargarMovimientos(); };
                return b;
            };
            const puntos = () => { const s=document.createElement('span'); s.textContent='…'; s.className='px-1 text-gray-400 self-center text-xs'; div.appendChild(s); };

            div.appendChild(btn('◀', paginaActual-1, paginaActual===1));
            if (totalPaginas<=7) { for(let i=1;i<=totalPaginas;i++) div.appendChild(btn(i,i,false,i===paginaActual)); }
            else if (paginaActual<=4) { for(let i=1;i<=5;i++) div.appendChild(btn(i,i,false,i===paginaActual)); puntos(); div.appendChild(btn(totalPaginas,totalPaginas)); }
            else if (paginaActual>=totalPaginas-3) { div.appendChild(btn(1,1)); puntos(); for(let i=totalPaginas-4;i<=totalPaginas;i++) div.appendChild(btn(i,i,false,i===paginaActual)); }
            else { div.appendChild(btn(1,1)); puntos(); for(let i=paginaActual-1;i<=paginaActual+1;i++) div.appendChild(btn(i,i,false,i===paginaActual)); puntos(); div.appendChild(btn(totalPaginas,totalPaginas)); }
            div.appendChild(btn('▶', paginaActual+1, paginaActual===totalPaginas));
        }

        // ---- CARGA ----
        function debounceBuscar() {
            clearTimeout(timerBuscar);
            timerBuscar = setTimeout(() => { paginaActual = 1; cargarMovimientos(); }, 400);
        }

        async function cargarMovimientos() {
            const search = document.getElementById('filtro-search').value;
            const tipo   = document.getElementById('filtro-tipo').value;
            const desde  = document.getElementById('filtro-desde').value;
            const hasta  = document.getElementById('filtro-hasta').value;

            const params = new URLSearchParams({
                page: paginaActual, limit: porPagina,
                search, tipo, desde, hasta
            });

            try {
                const res  = await fetch(`/api/movimientos?${params}`);
                const data = await res.json();
                if (!data.success) throw new Error();

                totalPaginas = data.totalPages;
                document.getElementById('resumen-total').textContent =
                    `${data.totalItems.toLocaleString('es-AR')} registros · página ${data.currentPage} de ${data.totalPages || 1}`;

                renderTabla(data.data);
                renderCards(data.data);
                renderPaginacion();
            } catch (e) {
                // Manejo de error para tabla en PC
                document.getElementById('tabla-movimientos').innerHTML =
                    `<tr><td colspan="6" class="p-4 text-center text-red-500">Error al cargar movimientos.</td></tr>`;
                
                // Manejo de error para las cards en celulares
                document.getElementById('cards-movimientos').innerHTML =
                    `<div class="p-6 text-center text-red-500">Error al cargar movimientos.</div>`;
            }
        }

        // ---- INIT ----
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btn-tema').innerText = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
            
            // Setear fecha hasta = hoy (corregido para tomar la zona horaria local de Buenos Aires)
            const hoy = new Date();
            const offset = hoy.getTimezoneOffset() * 60000;
            const fechaLocal = new Date(hoy.getTime() - offset).toISOString().split('T')[0];
            document.getElementById('filtro-hasta').value = fechaLocal;

            cargarUsuario();
            cargarMovimientos();
        });
    </script>
</body>
</html>
