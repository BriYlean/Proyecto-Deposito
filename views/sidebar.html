<!--
    SIDEBAR COMPONENTE
    ==================
    Incluir este bloque en cada página que requiera el sidebar.
    Requiere que el CSS de /styles.css esté linkeado en el <head>.
    El JS al final del bloque se encarga de cargar los datos del usuario.
-->

<!-- SIDEBAR OVERLAY (fondo oscuro mobile) -->
<div id="sidebar-overlay" class="sidebar-overlay" onclick="cerrarSidebar()"></div>

<!-- SIDEBAR -->
<aside id="sidebar" class="sidebar">

    <!-- Logo / Brand dentro del sidebar -->
    <div class="sidebar-brand">
        <span class="sidebar-brand-icon"><i class="fas fa-boxes"></i></span>
        <div>
            <div class="sidebar-brand-name">LOGÍSTICA</div>
            <div class="sidebar-brand-sub">Sistema de Control</div>
        </div>
    </div>

    <!-- Perfil de usuario -->
    <div class="sidebar-profile">
        <div class="sidebar-avatar" id="sb-avatar">?</div>
        <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="sb-nombre">Cargando...</div>
            <div class="sidebar-user-role" id="sb-rol">—</div>
        </div>
    </div>

    <div class="sidebar-divider"></div>

    <!-- Navegación -->
    <nav class="sidebar-nav">
        <div class="sidebar-nav-label">NAVEGACIÓN</div>

        <a href="/" class="sidebar-link" data-page="/">
            <span class="sidebar-link-icon"><i class="fas fa-chart-bar"></i></span>
            <span>Dashboard</span>
        </a>

        <a href="/listado" class="sidebar-link" data-page="/listado">
            <span class="sidebar-link-icon"><i class="fas fa-clipboard-list"></i></span>
            <span>Listado de Stock</span>
        </a>

        <a href="/pedidos" class="sidebar-link" data-page="/pedidos">
            <span class="sidebar-link-icon"><i class="fas fa-truck"></i></span>
            <span>Órdenes de Pedido</span>
        </a>

        <a href="/productos" class="sidebar-link" data-page="/productos">
            <span class="sidebar-link-icon"><i class="fas fa-tags"></i></span>
            <span>Catálogo de Productos</span>
        </a>
    </nav>

    <div class="sidebar-spacer"></div>

    <!-- Logout -->
    <div class="sidebar-footer">
        <div class="sidebar-divider"></div>
        <button class="sidebar-logout" onclick="cerrarSesion()">
            <span class="sidebar-logout-icon"><i class="fas fa-power-off"></i></span>
            <span>Cerrar Sesión</span>
        </button>
    </div>

</aside>


<script>
    (function () {
        // Marcar link activo
        const links = document.querySelectorAll('.sidebar-link');
        const currentPath = window.location.pathname;
        links.forEach(link => {
            if (link.getAttribute('data-page') === currentPath) {
                link.classList.add('active');
            }
        });

        // Cargar datos del usuario desde sessionStorage
        function cargarUsuario() {
            const raw = sessionStorage.getItem('usuario');
            if (!raw) {
                // No hay sesión → redirigir al login
                window.location.href = '/login';
                return;
            }

            try {
                const usuario = JSON.parse(raw);

                // Iniciales para el avatar (toma primera letra de cada palabra del nombre)
                const iniciales = usuario.nombre
                    .split(' ')
                    .slice(0, 2)
                    .map(n => n[0])
                    .join('')
                    .toUpperCase();

                document.getElementById('sb-avatar').textContent = iniciales;
                document.getElementById('sb-nombre').textContent = usuario.nombre;
                document.getElementById('sb-rol').textContent = usuario.rol || 'Operador';
            } catch (e) {
                console.error('Error al leer usuario:', e);
            }
        }

        cargarUsuario();
    })();

    function cerrarSesion() {
        if (!confirm('¿Cerrar sesión?')) return;
        sessionStorage.removeItem('usuario');
        fetch('/api/auth/logout', { method: 'POST' })
            .finally(() => window.location.href = '/login');
    }

    // Mobile: abrir/cerrar sidebar
    function abrirSidebar() {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('sidebar-overlay').classList.add('active');
    }
    function cerrarSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('active');
    }
</script>
